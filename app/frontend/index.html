<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gestão Saúde UBS+</title>
    <meta name="description" content="Portal de saúde das Unidades Básicas de Saúde de São José dos Campos" />

    <!-- ── PWA: Manifest ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16a34a" />

    <!-- ── iOS: "Adicionar à Tela Inicial" ───────────────────────────────── -->
    <!-- Habilita modo standalone (sem barra do Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Barra de status transparente sobre o conteúdo do app -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Nome exibido abaixo do ícone na tela inicial -->
    <meta name="apple-mobile-web-app-title" content="UBS+" />

    <!-- iOS ignora o manifest.json para ícones — exige apple-touch-icon PNG/WebP.
         apple-touch-icon.png tem fundo verde sólido (iOS aplica seus próprios cantos arredondados). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Windows / Edge ────────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#16a34a" />
    <meta name="msapplication-TileImage" content="/icon-192.webp" />

    <!-- ── Favicon (aba do browser) ──────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon-72.svg" />
    <link rel="alternate icon" type="image/webp" href="/icon-72.webp" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
